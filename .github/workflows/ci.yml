name: CI

# Runs automatically on every push and pull request against main —
# no terminal or manual action needed. Results show up as a green
# check or red X directly on the commit/PR in GitHub.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests (plan limits, access gates)
        run: npx vitest run
